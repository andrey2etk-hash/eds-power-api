<!DOCTYPE html>
<html>
  <head>
    <base target="_top" />
    <meta charset="utf-8" />
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 12px;
        font-size: 13px;
        color: #202124;
      }
      h1 {
        font-size: 15px;
        margin: 0 0 12px 0;
      }
      label {
        display: block;
        margin: 8px 0 4px 0;
        font-weight: 600;
      }
      input,
      textarea,
      select {
        width: 100%;
        box-sizing: border-box;
        padding: 6px 8px;
        font-size: 13px;
        border: 1px solid #dadce0;
        border-radius: 4px;
      }
      textarea {
        min-height: 64px;
        resize: vertical;
      }
      .actions {
        margin-top: 14px;
        display: flex;
        gap: 8px;
      }
      .actions button {
        flex: 1;
        padding: 8px;
        font-size: 13px;
        cursor: pointer;
        border-radius: 4px;
        border: 1px solid #dadce0;
        background: #fff;
      }
      .actions button.primary {
        background: #1a73e8;
        color: #fff;
        border-color: #1a73e8;
      }
      .actions button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }
      .err {
        background: #fce8e6;
        color: #c5221f;
        padding: 8px;
        border-radius: 4px;
        margin-bottom: 10px;
        display: none;
      }
      .ok {
        background: #e6f4ea;
        color: #137333;
        padding: 8px;
        border-radius: 4px;
        margin-bottom: 10px;
        display: none;
      }
      .load {
        color: #1967d2;
        margin-bottom: 8px;
        display: none;
      }
      .hint {
        color: #5f6368;
        font-size: 12px;
        margin-top: 4px;
      }
      .success-panel {
        display: none;
      }
      .success-panel h2 {
        font-size: 15px;
        margin: 0 0 10px 0;
        color: #137333;
      }
      .success-panel .detail {
        margin: 8px 0;
        line-height: 1.45;
      }
    </style>
  </head>
  <body>
    <h1>Створити розрахунок</h1>
    <div id="err-box" class="err"></div>
    <div id="ok-box" class="ok"></div>
    <div id="load-box" class="load">Зачекайте…</div>

    <div id="success-panel" class="success-panel">
      <h2>Розрахунок створено</h2>
      <div id="success-detail" class="detail"></div>
      <p class="hint">Оновіть бічну панель («Оновити»), щоб побачити активний розрахунок.</p>
      <div class="actions">
        <button type="button" id="btn-close-success" class="primary">Закрити</button>
      </div>
    </div>

    <div id="form-panel">
      <label for="calculation_title">Назва розрахунку *</label>
      <input id="calculation_title" type="text" autocomplete="off" />

      <label for="potential_customer">Потенційний замовник *</label>
      <input id="potential_customer" type="text" autocomplete="off" />

      <label for="product_type">Тип продукту *</label>
      <select id="product_type" disabled>
        <option value="KZO">KZO</option>
      </select>
      <p class="hint">V1: лише KZO (задано бекендом).</p>

      <label for="external_reference">Об’єкт / заявка / примітка</label>
      <input id="external_reference" type="text" autocomplete="off" />

      <label for="comment">Коментар</label>
      <textarea id="comment"></textarea>

      <div class="actions">
        <button type="button" id="btn-cancel">Скасувати</button>
        <button type="button" id="btn-submit" class="primary">Створити</button>
      </div>
    </div>

    <script>
      var bootstrap = null;
      var submitInFlight = false;
      var bootstrapLoadText = "Зачекайте…";
      var submitLoadText = "Створюємо розрахунок...";

      function showErr(msg) {
        var b = document.getElementById("err-box");
        b.style.display = msg ? "block" : "none";
        b.textContent = msg || "";
      }
      function showOk(msg) {
        var b = document.getElementById("ok-box");
        b.style.display = msg ? "block" : "none";
        b.textContent = msg || "";
      }
      function setLoadMessage(text) {
        document.getElementById("load-box").textContent = text || bootstrapLoadText;
      }
      function setLoading(on, message) {
        var el = document.getElementById("load-box");
        if (message) {
          el.textContent = message;
        }
        el.style.display = on ? "block" : "none";
      }

      function readForm() {
        return {
          calculation_title: document.getElementById("calculation_title").value,
          potential_customer: document.getElementById("potential_customer").value,
          comment: document.getElementById("comment").value,
          external_reference: document.getElementById("external_reference").value
        };
      }

      function validateForm() {
        var f = readForm();
        if (!String(f.calculation_title || "").trim()) {
          return "Вкажіть назву розрахунку.";
        }
        if (!String(f.potential_customer || "").trim()) {
          return "Вкажіть потенційного замовника.";
        }
        return null;
      }

      function onBootstrap(res) {
        setLoadMessage(bootstrapLoadText);
        setLoading(false);
        if (!res || !res.ok) {
          showErr(res && res.message ? res.message : "Не вдалось підготувати форму.");
          document.getElementById("btn-submit").disabled = true;
          return;
        }
        bootstrap = {terminal_id: res.terminal_id, spreadsheet_id: res.spreadsheet_id};
        document.getElementById("btn-submit").disabled = false;
      }

      function showSuccessPanel(calc) {
        var disp = String(calc.calculation_display_number || "");
        var st = String(calc.status || "");
        var pt = String(calc.product_type || "");
        var lines =
          "Номер: " +
          disp +
          "\nСтатус: " +
          st +
          "\nТип продукту: " +
          pt;
        document.getElementById("success-detail").textContent = lines;
        document.getElementById("form-panel").style.display = "none";
        document.getElementById("success-panel").style.display = "block";
        document.getElementById("btn-submit").disabled = true;
        document.getElementById("btn-cancel").disabled = true;
        showErr("");
        showOk("");
        setLoading(false);
        var sid = bootstrap && bootstrap.spreadsheet_id ? bootstrap.spreadsheet_id : "";
        var cid = calc.calculation_id;
        if (sid && cid) {
          try {
            google.script.run.module01CreateCalculationRememberActiveId(String(sid), String(cid));
          } catch (_e) {}
        }
      }

      function onSubmitResult(res) {
        submitInFlight = false;
        setLoadMessage(bootstrapLoadText);
        setLoading(false);
        document.getElementById("btn-cancel").disabled = false;

        if (!res || !res.ok) {
          document.getElementById("btn-submit").disabled = false;
          showErr(res && res.message ? res.message : "Помилка запиту.");
          return;
        }

        var httpStatus = typeof res.http_status === "number" ? res.http_status : 0;
        if (httpStatus >= 400) {
          document.getElementById("btn-submit").disabled = false;
          showErr("Помилка сервера (HTTP " + httpStatus + "). Спробуйте ще раз.");
          return;
        }

        var env = res.envelope || {};
        var stTop = typeof env.status === "string" ? env.status : "";
        if (stTop === "error") {
          var er = env.error || {};
          var code = typeof er.error_code === "string" ? er.error_code : "ERROR";
          var msg = typeof er.message === "string" && er.message ? er.message : "Помилка сервера.";
          showErr(code + ": " + msg);
          document.getElementById("btn-submit").disabled = false;
          return;
        }
        if (stTop !== "success" || !env.data) {
          document.getElementById("btn-submit").disabled = true;
          showErr("Некоректна відповідь сервера. Закрийте вікно та спробуйте пізніше; не натискайте «Створити» повторно, якщо розрахунок уже з’явився в БД.");
          return;
        }
        var calc = env.data.calculation;
        if (!calc || typeof calc !== "object") {
          document.getElementById("btn-submit").disabled = true;
          showErr("Некоректна відповідь сервера (відсутні дані розрахунку). Закрийте вікно та перевірте бічну панель; уникайте повторного створення.");
          return;
        }
        showSuccessPanel(calc);
      }

      function doSubmit() {
        if (submitInFlight) {
          return;
        }
        showErr("");
        showOk("");
        var v = validateForm();
        if (v) {
          showErr(v);
          return;
        }
        if (!bootstrap) {
          showErr("Контекст не завантажено.");
          return;
        }
        submitInFlight = true;
        document.getElementById("btn-submit").disabled = true;
        document.getElementById("btn-cancel").disabled = true;
        setLoadMessage(submitLoadText);
        setLoading(true, submitLoadText);
        google.script.run
          .withSuccessHandler(onSubmitResult)
          .withFailureHandler(function () {
            submitInFlight = false;
            setLoadMessage(bootstrapLoadText);
            setLoading(false);
            document.getElementById("btn-submit").disabled = false;
            document.getElementById("btn-cancel").disabled = false;
            showErr("Помилка виклику сервера (google.script.run).");
          })
          .module01CreateCalculationSubmit(readForm(), bootstrap);
      }

      document.getElementById("btn-cancel").addEventListener("click", function () {
        if (submitInFlight) {
          return;
        }
        google.script.host.close();
      });
      document.getElementById("btn-submit").addEventListener("click", doSubmit);
      document.getElementById("btn-close-success").addEventListener("click", function () {
        google.script.host.close();
      });

      setLoadMessage(bootstrapLoadText);
      setLoading(true, bootstrapLoadText);
      document.getElementById("btn-submit").disabled = true;
      google.script.run
        .withSuccessHandler(onBootstrap)
        .withFailureHandler(function () {
          setLoading(false);
          showErr("Помилка bootstrap.");
        })
        .module01CreateCalculationBootstrap();
    </script>
  </body>
</html>
